{% extends 'base.html' %}
{% load static %}
{% block title %}Patient Login{% endblock %}

{% block body %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
  <div class="card-style" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-4 text-success">Patient Login</h3>
    {% if errmsg %}
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
      <strong>Error:</strong> {{ errmsg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="mb-3">
        <label>Email</label>
        <input type="email" name="uname" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" name="upass" class="form-control" required>
      </div>
      <div class="mb-3 form-check">
        <input class="form-check-input" type="checkbox" id="rememberMe1" checked>
        <label class="form-check-label" for="rememberMe1">Remember me</label>
      </div>
      <div class="d-grid gap-2">
        <input type="submit" value="Login" class="btn btn-success">
        <a href="#" class="text-center small text-muted">Forgot password?</a>
      </div>
      <p class="text-center mt-3">Not registered? <a href="{% url 'signup_1' %}">Create Account</a></p>
    </form>
  </div>
</div>
{% endblock %}
