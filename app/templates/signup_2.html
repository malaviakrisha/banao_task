{% extends 'base.html' %}
{% load static %}
{% block title %}Doctor Sign Up{% endblock %}

{% block body %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh;">
  <div class="card-style" style="width: 100%; max-width: 600px;">
    <h3 class="text-center mb-4 text-info">Doctor Sign Up</h3>
    {% if errmsg %}
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
      <strong>Error:</strong> {{ errmsg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-md-6">
          <label>First Name</label>
          <input type="text" name="fname" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Last Name</label>
          <input type="text" name="lname" class="form-control" required>
        </div>
        <div class="col-md-12">
          <label>Username</label>
          <input type="text" name="username1" class="form-control" required>
        </div>
        <div class="col-md-12">
          <label>Email</label>
          <input type="email" name="uname" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Password</label>
          <input type="password" name="upass" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Confirm Password</label>
          <input type="password" name="ucpass" class="form-control" required>
        </div>
        <div class="col-md-12">
          <label>Address Line 1</label>
          <input type="text" name="address_line1" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>City</label>
          <input type="text" name="city" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label>Pincode</label>
          <input type="text" name="pincode" class="form-control" required>
        </div>
        <div class="col-md-12">
          <label>Profile Picture</label>
          <input type="file" name="photo" class="form-control">
        </div>
      </div>
      <div class="form-check my-3">
        <input class="form-check-input" type="checkbox" id="rememberMeD" checked>
        <label class="form-check-label" for="rememberMeD">Remember me</label>
      </div>
      <div class="d-grid gap-2">
        <input type="submit" value="Register" class="btn btn-info text-white">
        <a href="{% url 'index' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
